  // ---------- FILL-IN-THE-BLANK MODE ----------
  let fillState = null;
  function pickBlankWords(text, count) {
    const words = (text || '').split(/\s+/).filter(Boolean);
    if (!words.length) return [];
    // Eligible words: normalized length >= 2 (skip trivial prepositions/particles)
    const eligible = words.map((w, i) => ({
      index: i,
      word: w,
      len: normalizeForCompare(w, 'ar').length,
    })).filter(r => r.len >= 2);
    // Fallback: if none pass the filter, use all words
    const pool = eligible.length ? eligible : words.map((w, i) => ({ index: i, word: w }));
    let n;
    if (count === 'max') {
      n = pool.length;
    } else {
      n = Math.min(count, pool.length);
    }
    // RANDOM pick (different on every refresh) — shuffle pool, take first N
    const picked = shuffle(pool).slice(0, Math.max(1, n));
    picked.sort((a, b) => a.index - b.index); // restore reading order for display
    return picked.map(p => ({ index: p.index, word: p.word }));
  }
  function getDistractors(deck, currentCard, targetWord, count, lang) {
    const normTarget = normalizeForCompare(targetWord, lang);
    const seen = new Set([normTarget]);
    const pool = [];
    (deck.cards || []).forEach(c => {
      if (c === currentCard) return;
      const txt = (lang === 'ar' ? c.ar : c.he) || '';
      txt.split(/\s+/).filter(Boolean).forEach(w => {
        const norm = normalizeForCompare(w, lang);
        if (norm.length >= 2 && !seen.has(norm)) {
          seen.add(norm);
          pool.push({ w, diff: Math.abs(norm.length - normTarget.length) });
        }
      });
    });
    if (!pool.length) return [];
    pool.sort((a, b) => a.diff - b.diff);
    const narrowed = pool.slice(0, Math.max(30, count * 8));
    const shuffled = shuffle(narrowed);
    return shuffled.slice(0, count).map(x => x.w);
  }
  function renderFill() {
    const deck = currentDeck();
    const cards = activeCards();
    if (!deck || !cards.length) { renderEmpty(); return; }
    const sessionKey = deck.id + '|' + state.filter + '|' + state.order + '|' + state.direction + '|' + state.fillBlanksCount + '|' + state.fillInputMode + '|' + cards.length;
    if (!fillState || fillState.sessionKey !== sessionKey) {
      fillState = {
        sessionKey,
        deckId: deck.id,
        cards: cards.slice(),
        order: makeOrder(cards.length),
        idx: 0,
        correct: 0,
        wrong: 0,
        answered: false,
        blanks: null,    // [{ index, word, userAnswer, options, chosen, wasCorrect }]
      };
    }
    drawFill();
  }
  function buildFillBlanks(card, blankLang) {
    const blankText = card[blankLang] || '';
    const count = state.fillBlanksCount;
    const picked = pickBlankWords(blankText, count);
    if (!picked.length) return null;
    const deck = currentDeck();
    return picked.map(({ index, word }) => {
      const blank = {
        index, word,
        userAnswer: '',
        chosen: null,
        wasCorrect: null,
      };
      if (state.fillInputMode === 'mc') {
        const distractors = getDistractors(deck, card, word, 3, blankLang);
        const allOptions = [word, ...distractors];
        // De-dup (normalized)
        const seen = new Set();
        const unique = allOptions.filter(o => {
          const n = normalizeForCompare(o, blankLang);
          if (seen.has(n)) return false;
          seen.add(n); return true;
        });
        // Pad if too few
        while (unique.length < 4 && distractors.length > 0) {
          unique.push(distractors[Math.floor(Math.random() * distractors.length)]);
        }
        blank.options = shuffle(unique).slice(0, 4);
      }
      return blank;
    });
  }
  function drawFill() {
    const st = fillState;
    if (st.idx >= st.order.length) {
      const pct = Math.round(st.correct / Math.max(1, st.correct + st.wrong) * 100);
      screen.innerHTML = `
        <div class="match-done">
          <h3>🎉 סיימת את תרגול ההשלמה!</h3>
          <div>נכון: ${st.correct} &nbsp;·&nbsp; שגוי: ${st.wrong}</div>
          <div style="margin-top:8px;color:var(--muted)">ציון: ${pct}%</div>
          <button class="btn-primary" id="fill-restart" style="margin-top:14px;background:linear-gradient(90deg,var(--accent),var(--accent2));color:#fff;padding:12px;border-radius:12px;font-weight:700;width:100%;">התחל שוב</button>
        </div>
      `;
      document.getElementById('fill-restart').addEventListener('click', () => { fillState = null; render(); });
      return;
    }
    const card = st.cards[st.order[st.idx]];
    const hintLang = state.direction === 'ar2he' ? 'he' : 'ar';
    const blankLang = state.direction === 'ar2he' ? 'ar' : 'he';
    const hintText = card[hintLang] || '';
    const blankText = card[blankLang] || '';

    // Build blanks for this card if not built yet
    if (!st.blanks) {
      st.blanks = buildFillBlanks(card, blankLang);
      if (!st.blanks || !st.blanks.length) {
        // skip empty
        st.idx++; st.blanks = null; st.answered = false;
        drawFill(); return;
      }
    }

    const words = blankText.split(/\s+/).filter(Boolean);
    const blanksByIndex = {};
    st.blanks.forEach((b, bi) => { blanksByIndex[b.index] = { ...b, bi }; });

    const sentenceHtml = words.map((w, i) => {
      const b = blanksByIndex[i];
      if (b) {
        if (st.answered) {
          const cls = b.wasCorrect ? 'blank revealed-correct' : 'blank revealed-wrong';
          return `<span class="${cls}">${escapeHtml(b.word)}</span>`;
        }
        return `<span class="blank">${b.bi + 1}️⃣</span>`;
      }
      return escapeHtml(w);
    }).join(' ');

    const total = st.order.length;
    const pct = Math.round(st.idx / total * 100);

    let feedbackHtml = '';
    if (st.answered) {
      const correctCount = st.blanks.filter(b => b.wasCorrect).length;
      const allOk = correctCount === st.blanks.length;
      if (allOk) {
        feedbackHtml = `<div class="fill-feedback correct">✓ כל התשובות נכונות!</div>`;
      } else {
        const wrongBlanks = st.blanks
          .map((b, i) => ({ b, i }))
          .filter(x => !x.b.wasCorrect);
        const wrongInfo = wrongBlanks.map(({b, i}) =>
          `חוסר ${i+1}: <span class="correct-answer">${escapeHtml(b.word)}</span>`
        ).join('');
        feedbackHtml = `<div class="fill-feedback wrong">✗ נכון: ${correctCount}/${st.blanks.length}${wrongInfo}</div>`;
      }
    }

    const hintLabel = hintLang === 'he' ? 'רמז (עברית)' : 'رمز (ערבית)';
    const blankLabel = blankLang === 'he' ? 'השלם (עברית)' : 'השלם (ערבית)';

    const countOptions = [
      { val: 1, label: '1 חוסר' },
      { val: 2, label: '2 חוסרים' },
      { val: 3, label: '3 חוסרים' },
      { val: 'max', label: 'הכל' },
    ];
    const modeOptions = [
      { val: 'type', label: '⌨️ הקלדה' },
      { val: 'mc', label: '❓ אמריקאי' },
    ];
    const countBtns = countOptions.map(o =>
      `<button data-fc="${o.val}" class="${state.fillBlanksCount === o.val ? 'active' : ''}">${o.label}</button>`
    ).join('');
    const modeBtns = modeOptions.map(o =>
      `<button data-fm="${o.val}" class="${state.fillInputMode === o.val ? 'active' : ''}">${o.label}</button>`
    ).join('');

    // Build blanks UI
    let blanksUI = '';
    if (state.fillInputMode === 'type') {
      blanksUI = '<div class="fill-blanks">' + st.blanks.map((b, i) => {
        const cls = st.answered
          ? (b.wasCorrect ? 'correct' : 'wrong')
          : '';
        const val = escapeHtml(b.userAnswer || '');
        const disabled = st.answered ? 'disabled' : '';
        return `
          <div class="fill-blank-group">
            <div class="blank-label">חוסר ${i+1}</div>
            <input data-bi="${i}" class="${blankLang} ${cls}" dir="rtl" value="${val}" ${disabled} placeholder="הקלד את המילה..." autocomplete="off" autocorrect="off" spellcheck="false" />
          </div>
        `;
      }).join('') + '</div>';
    } else {
      // MC mode
      blanksUI = '<div class="fill-blanks">' + st.blanks.map((b, i) => {
        const opts = (b.options || []).map((opt, oi) => {
          let cls = 'fill-option-btn ' + blankLang;
          if (st.answered) {
            cls += ' disabled';
            if (normalizeForCompare(opt, blankLang) === normalizeForCompare(b.word, blankLang)) cls += ' correct';
            else if (b.chosen === opt) cls += ' wrong';
          } else if (b.chosen === opt) cls += ' selected';
          return `<button data-bi="${i}" data-oi="${oi}" class="${cls}">${escapeHtml(opt)}</button>`;
        }).join('');
        return `
          <div class="fill-blank-group">
            <div class="blank-label">חוסר ${i+1}</div>
            <div class="fill-options-grid">${opts}</div>
          </div>
        `;
      }).join('') + '</div>';
    }

    // All blanks need an answer for submit to be enabled
    const allAnswered = st.blanks.every(b =>
      state.fillInputMode === 'type' ? (b.userAnswer || '').trim().length > 0 : b.chosen != null
    );

    screen.innerHTML = `
      <div class="flash-progress">
        ${st.idx+1} / ${total} &nbsp;·&nbsp; נכון: ${st.correct} · שגוי: ${st.wrong}
        <div class="bar"><div class="fill" style="width:${pct}%"></div></div>
      </div>
      <div class="fill-mode-toggles">
        <div class="toggle-wrap">
          <div class="toggle-label">כמות חוסרים</div>
          <div class="toggle-group">${countBtns}</div>
        </div>
        <div class="toggle-wrap">
          <div class="toggle-label">צורת מענה</div>
          <div class="toggle-group">${modeBtns}</div>
        </div>
      </div>
      <div class="fill-prompt">
        <div class="label">${hintLabel}</div>
        <div class="hint-text ${hintLang}">${escapeHtml(hintText)}</div>
        <div class="label" style="margin-top:12px;">${blankLabel}</div>
        <div class="sentence ${blankLang}">${sentenceHtml}</div>
      </div>
      ${feedbackHtml}
      ${blanksUI}
      ${!st.answered ? `
        <div class="fill-submit-bar">
          <button id="fill-submit" ${allAnswered ? '' : 'disabled'}>בדוק</button>
        </div>
        <div class="fill-actions">
          <button id="fill-skip">דלג</button>
          <button id="fill-reveal" class="primary">הצג תשובה</button>
        </div>
      ` : `
        <div class="fill-actions">
          <button id="fill-mark-dunno">❌ סמן "לא ידעתי"</button>
          <button id="fill-next" class="primary" style="display:inline-block;">הבא ▶</button>
        </div>
      `}
    `;

    // Wire toggles (changing resets session)
    screen.querySelectorAll('[data-fc]').forEach(b => {
      b.addEventListener('click', () => {
        const v = b.dataset.fc;
        state.fillBlanksCount = (v === 'max') ? 'max' : parseInt(v);
        save();
        fillState = null; renderFill();
      });
    });
    screen.querySelectorAll('[data-fm]').forEach(b => {
      b.addEventListener('click', () => {
        state.fillInputMode = b.dataset.fm;
        save();
        fillState = null; renderFill();
      });
    });

    if (!st.answered) {
      if (state.fillInputMode === 'type') {
        const inputs = screen.querySelectorAll('.fill-blank-group input');
        inputs.forEach((inp, i) => {
          inp.addEventListener('input', () => {
            st.blanks[i].userAnswer = inp.value;
            const submit = document.getElementById('fill-submit');
            if (submit) submit.disabled = !st.blanks.every(b => (b.userAnswer || '').trim().length > 0);
          });
          inp.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
              e.preventDefault();
              const next = inputs[i + 1];
              if (next) try { next.focus(); } catch(_){}
              else {
                const submit = document.getElementById('fill-submit');
                if (submit && !submit.disabled) submit.click();
              }
            }
          });
        });
        if (inputs[0]) try { inputs[0].focus(); } catch(_){}
      } else {
        // MC mode: click to select
        screen.querySelectorAll('.fill-option-btn').forEach(btn => {
          btn.addEventListener('click', () => {
            const bi = parseInt(btn.dataset.bi);
            const oi = parseInt(btn.dataset.oi);
            st.blanks[bi].chosen = st.blanks[bi].options[oi];
            drawFill();
          });
        });
      }

      const submit = document.getElementById('fill-submit');
      if (submit) submit.addEventListener('click', () => submitFill(card, blankLang));
      document.getElementById('fill-skip').addEventListener('click', () => {
        st.idx++; st.blanks = null; st.answered = false;
        drawFill();
      });
      document.getElementById('fill-reveal').addEventListener('click', () => {
        st.answered = true;
        st.blanks.forEach(b => {
          b.wasCorrect = false;
        });
        st.wrong++;
        markHard(st.deckId, card);
        renderFilterRow();
        drawFill();
      });
    } else {
      document.getElementById('fill-mark-dunno').addEventListener('click', () => {
        markHard(st.deckId, card);
        renderFilterRow();
        toast('סומן כ"לא ידעתי"');
      });
      document.getElementById('fill-next').addEventListener('click', () => {
        st.idx++; st.blanks = null; st.answered = false;
        drawFill();
      });
    }
  }
  function submitFill(card, blankLang) {
    const st = fillState;
    let allOk = true;
    st.blanks.forEach(b => {
      const user = state.fillInputMode === 'type'
        ? normalizeForCompare(b.userAnswer || '', blankLang)
        : normalizeForCompare(b.chosen || '', blankLang);
      const target = normalizeForCompare(b.word, blankLang);
      b.wasCorrect = user.length > 0 && user === target;
      if (!b.wasCorrect) allOk = false;
    });
    st.answered = true;
    if (allOk) {
      st.correct++;
      unmarkHard(st.deckId, card);
    } else {
      st.wrong++;
      markHard(st.deckId, card);
    }
    renderFilterRow();
    drawFill();
  }

  // ---------- EMPTY STATE ----------
  function renderEmpty() {
    screen.innerHTML = `
      <div class="empty">
        <span class="emoji">📭</span>
        החפיסה ריקה. לחץ על 📚 כדי ליצור או לערוך חפיסה.
      </div>
    `;
  }

  // ---------- MAIN RENDER ----------
  function render() {
    renderDeckSelect();
    renderFilterRow();
    flashState = null; matchState = null; mcState = null; listState = null; fillState = null;
    const deck = currentDeck();
    if (!deck || !deck.cards.length) { renderEmpty(); return; }
    // If filter was 'hard' but no hard cards exist → fall back to 'all'
    if (state.filter === 'hard' && hardSet(deck.id).size === 0) {
      state.filter = 'all';
      renderFilterRow();
    }
    if (state.mode === 'flash') renderFlash();
    else if (state.mode === 'list') renderList();
    else if (state.mode === 'fill') renderFill();
    else if (state.mode === 'match') renderMatch();
    else if (state.mode === 'mc') renderMC();
  }

  // ---------- DECK MANAGER MODAL ----------
  function openDeckManager() {
    const html = `
      <div class="modal-overlay">
        <div class="modal">
          <button class="close-x" id="close-modal">×</button>
          <h2>📚 ניהול חפיסות</h2>
          <div id="deck-list"></div>
          <button class="btn-primary" id="btn-new-deck">+ חפיסה חדשה</button>
          <button class="btn-secondary" id="btn-import">📥 ייבוא מ-CSV / טקסט</button>
          <div class="tip">פורמט: כל שורה — "ערבית , עברית" או מופרד ב-Tab</div>
        </div>
      </div>
    `;
    showModal(html);
    drawDeckList();
    document.getElementById('btn-new-deck').addEventListener('click', newDeckFlow);
    document.getElementById('btn-import').addEventListener('click', importFlow);
  }
  function drawDeckList() {
    const container = document.getElementById('deck-list');
    if (!container) return;
    container.innerHTML = '';
    allDecks().forEach(d => {
      const el = document.createElement('div');
      el.className = 'deck-list-item';
      const isCustom = isCustomDeck(d.id);
      el.innerHTML = `
        <div class="info">
          <div class="name">${escapeHtml(d.name)}</div>
          <div class="meta">${d.cards.length} כרטיסים ${isCustom ? '(משלך)' : '(מובנה)'}</div>
        </div>
        <div class="actions">
          <button data-a="edit">${isCustom ? 'ערוך' : 'צפה'}</button>
          ${isCustom ? '<button data-a="del">🗑</button>' : ''}
        </div>
      `;
      el.querySelector('[data-a="edit"]').addEventListener('click', () => openDeckEditor(d.id));
      const delBtn = el.querySelector('[data-a="del"]');
      if (delBtn) delBtn.addEventListener('click', () => {
        if (confirm('למחוק את החפיסה "' + d.name + '"?')) {
          state.customDecks = state.customDecks.filter(x => x.id !== d.id);
          if (state.currentDeckId === d.id) state.currentDeckId = allDecks()[0]?.id;
          save();
          drawDeckList();
          renderDeckSelect();
          render();
        }
      });
      container.appendChild(el);
    });
  }
  function newDeckFlow() {
    const name = prompt('שם החפיסה:');
    if (!name) return;
    const id = 'custom_' + Date.now();
    state.customDecks.push({ id, name: name.trim(), description: '', cards: [] });
    state.currentDeckId = id;
    save();
    closeModal();
    setTimeout(() => openDeckEditor(id), 50);
  }
  function openDeckEditor(deckId) {
    const deck = allDecks().find(d => d.id === deckId);
    if (!deck) return;
    const isCustom = isCustomDeck(deckId);
    const html = `
      <div class="modal-overlay">
        <div class="modal">
          <button class="close-x" id="close-modal">×</button>
          <h2>${escapeHtml(deck.name)}</h2>
          <div class="tip">${deck.cards.length} כרטיסים · ${isCustom ? 'ניתנת לעריכה' : 'חפיסה מובנית (קריאה בלבד)'}</div>
          ${isCustom ? `
            <label>הוסף כרטיס חדש</label>
            <div style="display:grid;grid-template-columns:1fr 1fr auto;gap:6px;">
              <input id="new-ar" placeholder="ערבית" dir="rtl" />
              <input id="new-he" placeholder="עברית" dir="rtl" />
              <button id="btn-add-card" style="background:var(--accent);color:#fff;padding:0 14px;border-radius:10px;font-weight:700;">+</button>
            </div>
            <label>או ייבא רשימה (שורה לכל כרטיס; פסיק או Tab בין השפות)</label>
            <textarea id="bulk-input" placeholder="أَب , אב&#10;يَوْم , יום"></textarea>
            <button class="btn-secondary" id="btn-bulk-add">הוסף הכל</button>
          ` : ''}
          <label>כרטיסים בחפיסה</label>
          <div class="search-row" style="margin-bottom:8px;">
            <span>🔎</span>
            <input id="deck-card-search" placeholder="חיפוש כרטיס..." dir="rtl" />
            <button id="deck-card-search-clear" title="נקה" style="display:none;">✕</button>
          </div>
          <div id="card-list" style="max-height:40vh;overflow-y:auto;"></div>
          <button class="btn-secondary" id="btn-export-word">📄 ייצא ל-Word (.doc)</button>
          ${isCustom ? `
            <button class="btn-secondary" id="btn-export">📤 ייצא ל-CSV</button>
          ` : `<button class="btn-secondary" id="btn-clone">📋 העתק כחפיסה שלי</button>`}
          <button class="btn-primary" id="btn-use-deck">השתמש בחפיסה זו</button>
        </div>
      </div>
    `;
    showModal(html);
    drawCardList(deckId);
    // Deck editor search
    const deckSearchInput = document.getElementById('deck-card-search');
    const deckSearchClear = document.getElementById('deck-card-search-clear');
    let deckSearchQuery = '';
    if (deckSearchInput) {
      deckSearchInput.addEventListener('input', () => {
        deckSearchQuery = deckSearchInput.value;
        if (deckSearchClear) deckSearchClear.style.display = deckSearchQuery ? 'inline-block' : 'none';
        drawCardList(deckId, deckSearchQuery);
      });
    }
    if (deckSearchClear) {
      deckSearchClear.addEventListener('click', () => {
        deckSearchInput.value = '';
        deckSearchQuery = '';
        deckSearchClear.style.display = 'none';
        drawCardList(deckId, '');
        deckSearchInput.focus();
      });
    }
    document.getElementById('btn-use-deck').addEventListener('click', () => {
      state.currentDeckId = deckId; save(); closeModal(); render();
    });
    document.getElementById('btn-export-word').addEventListener('click', () => {
      exportDeckToWord(deck);
    });
    if (isCustom) {
      document.getElementById('btn-add-card').addEventListener('click', () => {
        const ar = document.getElementById('new-ar').value.trim();
        const he = document.getElementById('new-he').value.trim();
        if (!ar || !he) { toast('יש למלא את שתי השפות'); return; }
        deck.cards.push({ ar, he });
        save(); drawCardList(deckId);
        document.getElementById('new-ar').value = '';
        document.getElementById('new-he').value = '';
      });
      document.getElementById('btn-bulk-add').addEventListener('click', () => {
        const text = document.getElementById('bulk-input').value;
        const added = parseBulk(text, deck);
        save(); drawCardList(deckId);
        document.getElementById('bulk-input').value = '';
        toast(`נוספו ${added} כרטיסים`);
      });
      document.getElementById('btn-export').addEventListener('click', () => exportDeck(deck));
    } else {
      document.getElementById('btn-clone').addEventListener('click', () => {
        const id = 'custom_' + Date.now();
        state.customDecks.push({ id, name: deck.name + ' (עותק)', description: deck.description, cards: deck.cards.slice() });
        state.currentDeckId = id;
        save(); closeModal(); render();
        toast('הועתק לחפיסות שלך');
      });
    }
  }
  function drawCardList(deckId, searchQuery) {
    const deck = allDecks().find(d => d.id === deckId);
    const container = document.getElementById('card-list');
    if (!container || !deck) return;
    container.innerHTML = '';
    if (!deck.cards.length) {
      container.innerHTML = '<div class="tip">אין כרטיסים עדיין.</div>';
      return;
    }
    const isCustom = isCustomDeck(deckId);
    const query = (searchQuery || '').trim();
    const filtered = deck.cards
      .map((c, idx) => ({ c, idx }))
      .filter(({c}) => matchesSearch(c, query));
    if (query && filtered.length === 0) {
      container.innerHTML = `<div class="tip">אין התאמות ל"${escapeHtml(query)}"</div>`;
      return;
    }
    if (query) {
      const info = document.createElement('div');
      info.className = 'tip';
      info.style.marginBottom = '6px';
      info.textContent = `${filtered.length} מתוך ${deck.cards.length} כרטיסים`;
      container.appendChild(info);
    }
    filtered.forEach(({c, idx}) => {
      const el = document.createElement('div');
      el.className = 'card-list-item';
      el.innerHTML = `
        <div class="ar">${escapeHtml(c.ar)}</div>
        <div class="he">${escapeHtml(c.he)}</div>
        ${isCustom ? `<button data-i="${idx}">✕</button>` : '<span></span>'}
      `;
      const del = el.querySelector('button');
      if (del) del.addEventListener('click', () => {
        deck.cards.splice(idx, 1); save(); drawCardList(deckId, query);
      });
      container.appendChild(el);
    });
  }
  function parseBulk(text, deck) {
    let added = 0;
    text.split('\n').forEach(line => {
      line = line.trim();
      if (!line) return;
      let parts;
      if (line.includes('\t')) parts = line.split('\t');
      else if (line.includes(',')) parts = line.split(/,(.+)/);
      else return;
      const ar = (parts[0] || '').trim();
      const he = (parts[1] || '').trim();
      if (ar && he) { deck.cards.push({ ar, he }); added++; }
    });
    return added;
  }
  function exportDeck(deck) {
    const lines = ['ערבית\tעברית'];
    deck.cards.forEach(c => lines.push(c.ar + '\t' + c.he));
    const blob = new Blob([lines.join('\n')], { type: 'text/tab-separated-values;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = (deck.name || 'deck') + '.tsv';
    document.body.appendChild(a); a.click(); a.remove();
    URL.revokeObjectURL(url);
    toast('הורד לקובץ');
  }
  function importFlow() {
    const html = `
      <div class="modal-overlay">
        <div class="modal">
          <button class="close-x" id="close-modal">×</button>
          <h2>📥 ייבוא חפיסה חדשה</h2>
          <label>שם החפיסה</label>
          <input id="imp-name" placeholder="למשל: יחידה 3" />
          <label>הדבק רשימה (שורה לכל כרטיס; פסיק או Tab)</label>
          <textarea id="imp-text" placeholder="أَب , אב&#10;يَوْم , יום"></textarea>
          <button class="btn-primary" id="btn-do-import">ייבא</button>
        </div>
      </div>
    `;
    showModal(html);
    document.getElementById('btn-do-import').addEventListener('click', () => {
      const name = document.getElementById('imp-name').value.trim() || 'חפיסה חדשה';
      const text = document.getElementById('imp-text').value;
      const id = 'custom_' + Date.now();
      const deck = { id, name, description: '', cards: [] };
      const n = parseBulk(text, deck);
      if (!n) { toast('לא נמצאו כרטיסים תקפים'); return; }
      state.customDecks.push(deck);
      state.currentDeckId = id;
      save(); closeModal(); render();
      toast(`נוצרה חפיסה עם ${n} כרטיסים`);
    });
  }

  // ---------- SETTINGS MODAL ----------
  function openSettings() {
    const html = `
      <div class="modal-overlay">
        <div class="modal">
          <button class="close-x" id="close-modal">×</button>
          <h2>⚙️ הגדרות</h2>
          <label>כיוון לימוד</label>
          <select id="set-dir">
            <option value="ar2he" ${state.direction==='ar2he'?'selected':''}>ערבית → עברית</option>
            <option value="he2ar" ${state.direction==='he2ar'?'selected':''}>עברית → ערבית</option>
          </select>
          <div class="tip">ניתן לשנות כיוון גם מהכפתור העליון.</div>
          <label>סדר הכרטיסים</label>
          <select id="set-order">
            <option value="shuffled" ${state.order==='shuffled'?'selected':''}>🔀 אקראי (מעורבב)</option>
            <option value="sequential" ${state.order==='sequential'?'selected':''}>📋 לפי סדר הקובץ</option>
          </select>
          <div class="tip">משפיע על מצבי "כרטיסיות" ו"אמריקאי". משחק ה"התאמה" תמיד דוגם אקראית.</div>
          <button class="btn-secondary" id="btn-reset">אפס נתונים מקומיים</button>
          <div class="tip">מוחק חפיסות משלך והעדפות. חפיסות מובנות יישארו.</div>
        </div>
      </div>
    `;
    showModal(html);
    document.getElementById('set-dir').addEventListener('change', (e) => {
      setDirection(e.target.value);
    });
    document.getElementById('set-order').addEventListener('change', (e) => {
      state.order = e.target.value;
      save();
      render();
      toast(state.order === 'sequential' ? '📋 לפי סדר הקובץ' : '🔀 אקראי');
    });
    document.getElementById('btn-reset').addEventListener('click', () => {
      if (confirm('למחוק את כל הנתונים המקומיים?')) {
        localStorage.removeItem(LS_KEY);
        location.reload();
      }
    });
  }

  // ---------- MODAL PLUMBING ----------
  function showModal(html) {
    modalHost.innerHTML = html;
    const overlay = modalHost.querySelector('.modal-overlay');
    overlay.addEventListener('click', (e) => { if (e.target === overlay) closeModal(); });
    const x = document.getElementById('close-modal');
    if (x) x.addEventListener('click', closeModal);
  }
  function closeModal() { modalHost.innerHTML = ''; }

  function escapeHtml(s) {
    if (s == null) return '';
    return String(s).replace(/[&<>"']/g, (c) => ({
      '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
    })[c]);
  }

  // ---------- SERVICE WORKER ----------
  if ('serviceWorker' in navigator && navigator.serviceWorker) {
    window.addEventListener('load', () => {
      try { navigator.serviceWorker.register('sw.js').catch(()=>{}); } catch(_){}
    });
  }

  // ---------- KEYBOARD SHORTCUTS ----------
  document.addEventListener('keydown', (e) => {
    // Skip if typing in input/textarea/select (except for Escape)
    const tag = (e.target && e.target.tagName) || '';
    const typingInField = /^(INPUT|TEXTAREA|SELECT)$/i.test(tag);

    // Always allow Escape to close modal
    if (e.key === 'Escape') {
      if (modalHost.querySelector('.modal-overlay')) { closeModal(); e.preventDefault(); return; }
    }
    // Ignore other shortcuts while typing
    if (typingInField) return;
    // Ignore when a modal is open (let user pick / click normally)
    if (modalHost.querySelector('.modal-overlay')) return;

    if (state.mode === 'flash') {
      if (e.key === ' ' || e.key === 'Enter') {
        const card = document.getElementById('flash-card');
        if (card) { card.click(); e.preventDefault(); }
      } else if (e.key === 'ArrowLeft') {
        // RTL: left arrow → next (moves with the layout flow)
        const n = document.getElementById('btn-next'); if (n) { n.click(); e.preventDefault(); }
      } else if (e.key === 'ArrowRight') {
        const p = document.getElementById('btn-prev'); if (p) { p.click(); e.preventDefault(); }
      } else if (e.key === '1') {
        const d = document.getElementById('btn-dunno'); if (d) { d.click(); e.preventDefault(); }
      } else if (e.key === '2') {
        const k = document.getElementById('btn-know'); if (k) { k.click(); e.preventDefault(); }
      }
    } else if (state.mode === 'mc') {
      const n = parseInt(e.key);
      if (n >= 1 && n <= 4) {
        const opts = document.querySelectorAll('.mc-option');
        if (opts[n-1] && !opts[n-1].classList.contains('correct') && !opts[n-1].classList.contains('wrong')) {
          opts[n-1].click(); e.preventDefault();
        }
      } else if (e.key === 'Enter' || e.key === ' ' || e.key === 'ArrowLeft') {
        const nx = document.getElementById('mc-next');
        if (nx && nx.classList.contains('show')) { nx.click(); e.preventDefault(); }
      }
    } else if (state.mode === 'fill') {
      // Enter: if "next" is visible, advance; otherwise let the per-input
      // handler in drawFill drive the submit/focus-move behavior.
      if (e.key === 'Enter') {
        const next = document.getElementById('fill-next');
        if (next) { next.click(); e.preventDefault(); }
      }
    }

    // '/' to focus search when available
    if (e.key === '/') {
      const s = document.querySelector('.search-row input');
      if (s) { s.focus(); e.preventDefault(); }
    }
  });

  // ---------- KICKOFF ----------
  // Sync toggle UI from state
  document.querySelectorAll('#dir-toggle button').forEach(b => {
    b.classList.toggle('active', b.dataset.dir === state.direction);
  });
  document.querySelectorAll('.mode-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.mode === state.mode);
  });

  render();

  // Expose for debugging
  window.__app = { state, render, getFillState: () => fillState };

})();
</script>
