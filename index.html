<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<meta name="theme-color" content="#0f172a" />
<title>קוויזלטים לבגרות – עברית ⇄ ערבית</title>
<link rel="manifest" href="manifest.json" />
<link rel="icon" href="icon-192.png" />
<link rel="apple-touch-icon" href="icon-192.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@400;500;600;700&family=Cairo:wght@400;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0f172a;
    --bg2: #1e293b;
    --card: #ffffff;
    --card-bg-dark: #334155;
    --text: #f1f5f9;
    --text-dark: #0f172a;
    --muted: #94a3b8;
    --accent: #38bdf8;
    --accent2: #a78bfa;
    --good: #22c55e;
    --bad: #ef4444;
    --warning: #f59e0b;
    --border: #334155;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans Hebrew", "Noto Sans Arabic", "Arial", sans-serif;
    background: linear-gradient(180deg, #0f172a 0%, #1e293b 100%);
    color: var(--text);
    overflow-x: hidden;
    overscroll-behavior: none;
    touch-action: manipulation;
  }
  button { font-family: inherit; cursor: pointer; border: none; }
  input, select, textarea { font-family: inherit; }

  #app {
    max-width: 600px;
    margin: 0 auto;
    min-height: 100vh;
    padding: 12px;
    display: flex;
    flex-direction: column;
  }

  /* Top bar */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 4px 16px;
    gap: 8px;
  }
  .topbar h1 {
    margin: 0;
    font-size: 20px;
    letter-spacing: 0.5px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  .icon-btn {
    background: rgba(255,255,255,0.06);
    color: var(--text);
    border-radius: 10px;
    width: 40px; height: 40px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    transition: background .15s;
  }
  .icon-btn:hover, .icon-btn:active { background: rgba(255,255,255,0.14); }

  /* Direction toggle */
  .dir-toggle {
    display: flex;
    background: rgba(255,255,255,0.06);
    border-radius: 12px;
    padding: 4px;
    margin-bottom: 12px;
  }
  .dir-toggle button {
    flex: 1;
    padding: 10px 8px;
    background: transparent;
    color: var(--muted);
    font-weight: 600;
    font-size: 14px;
    border-radius: 8px;
    transition: all .15s;
  }
  .dir-toggle button.active {
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    color: #fff;
  }

  /* Deck selector */
  .deck-row {
    display: flex; align-items: center; gap: 8px;
    background: rgba(255,255,255,0.04);
    padding: 10px 12px;
    border-radius: 12px;
    margin-bottom: 12px;
  }
  .deck-row select {
    flex: 1;
    background: transparent;
    color: var(--text);
    border: none;
    font-size: 15px;
    outline: none;
    padding: 4px;
  }
  .deck-row select option { background: var(--bg2); color: var(--text); }
  .deck-count { color: var(--muted); font-size: 13px; white-space: nowrap; }

  /* Mode tabs */
  .modes {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 4px;
    margin-bottom: 16px;
  }
  .mode-btn {
    padding: 8px 2px;
    border-radius: 10px;
    background: rgba(255,255,255,0.05);
    color: var(--text);
    font-size: 11px;
    font-weight: 600;
    transition: all .15s;
    border: 2px solid transparent;
  }
  .mode-btn.active {
    background: rgba(56,189,248,0.12);
    border-color: var(--accent);
    color: var(--accent);
  }
  .mode-btn .emoji { display: block; font-size: 18px; margin-bottom: 3px; }

  /* Filter row */
  .filter-row {
    display: flex;
    gap: 8px;
    margin-bottom: 14px;
  }
  .filter-btn {
    flex: 1;
    padding: 10px 8px;
    border-radius: 10px;
    background: rgba(255,255,255,0.05);
    color: var(--muted);
    font-size: 13px;
    font-weight: 600;
    border: 2px solid transparent;
    transition: all .15s;
  }
  .filter-btn.active {
    background: rgba(251,146,60,0.14);
    border-color: #fb923c;
    color: #fdba74;
  }
  .filter-btn.all.active {
    background: rgba(255,255,255,0.12);
    border-color: rgba(255,255,255,0.25);
    color: var(--text);
  }
  .filter-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .filter-btn .count {
    display: inline-block;
    background: rgba(0,0,0,0.25);
    padding: 1px 8px;
    border-radius: 10px;
    margin-inline-start: 6px;
    font-size: 12px;
  }
  .filter-row .reset-hard {
    background: transparent;
    color: var(--muted);
    padding: 6px 10px;
    border-radius: 8px;
    font-size: 18px;
    align-self: center;
  }
  .filter-row .reset-hard:hover { color: var(--bad); }

  /* Screen container */
  .screen {
    flex: 1;
    display: flex;
    flex-direction: column;
    animation: fadeIn .2s ease;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

  /* ---------- FLASHCARD ---------- */
  .card-wrap {
    perspective: 1200px;
    flex: 1;
    min-height: 260px;
    display: flex;
    align-items: stretch;
    margin-bottom: 12px;
  }
  .card {
    width: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform .55s cubic-bezier(.2,.8,.2,1);
  }
  .card.flipped { transform: rotateY(180deg); }
  .card .face {
    position: absolute; inset: 0;
    background: var(--card);
    color: var(--text-dark);
    border-radius: 20px;
    padding: 20px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    text-align: center;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    overflow: auto;
  }
  .card .back { transform: rotateY(180deg); background: #fef3c7; }
  .card .word {
    font-size: 34px;
    font-weight: 700;
    line-height: 1.3;
    word-break: break-word;
  }
  .card .word.ar { font-family: "Noto Sans Arabic", "Cairo", "Tajawal", sans-serif; font-size: 40px; font-weight: 600; }
  .card .hint { color: #64748b; font-size: 12px; margin-top: 12px; }
  .card .lang-label {
    position: absolute; top: 12px; inset-inline-start: 16px;
    font-size: 11px;
    font-weight: 700;
    color: #64748b;
    letter-spacing: 1px;
  }

  .flash-progress {
    color: var(--muted); text-align: center; font-size: 14px; margin-bottom: 8px;
  }
  .flash-progress .bar {
    height: 6px; background: rgba(255,255,255,0.08); border-radius: 3px; margin-top: 6px; overflow: hidden;
  }
  .flash-progress .bar .fill {
    height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2));
    transition: width .25s;
  }

  .flash-controls {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  .btn-know, .btn-dunno {
    padding: 14px;
    border-radius: 14px;
    font-size: 15px;
    font-weight: 700;
    color: #fff;
    transition: transform .1s, filter .15s;
  }
  .btn-know { background: var(--good); }
  .btn-dunno { background: var(--bad); }
  .btn-know:active, .btn-dunno:active { transform: scale(0.97); }
  .flash-nav {
    display: flex; justify-content: space-between; gap: 8px; margin-top: 8px;
  }
  .flash-nav button {
    flex: 1;
    padding: 10px;
    border-radius: 10px;
    background: rgba(255,255,255,0.08);
    color: var(--text);
    font-size: 14px;
  }

  /* ---------- MATCH ---------- */
  .match-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    flex: 1;
  }
  .match-item {
    min-height: 60px;
    padding: 10px 8px;
    border-radius: 12px;
    background: var(--card);
    color: var(--text-dark);
    display: flex; align-items: center; justify-content: center;
    text-align: center;
    font-size: 15px;
    font-weight: 600;
    line-height: 1.3;
    cursor: pointer;
    transition: all .15s;
    border: 2px solid transparent;
    word-break: break-word;
  }
  .match-item.ar { font-family: "Noto Sans Arabic", "Cairo", sans-serif; font-size: 18px; font-weight: 600; }
  .match-item.selected { border-color: var(--accent); background: #e0f2fe; }
  .match-item.matched { opacity: 0; pointer-events: none; transform: scale(0.85); }
  .match-item.wrong { border-color: var(--bad); background: #fee2e2; animation: shake .3s; }
  @keyframes shake { 0%,100% { transform: translateX(0); } 25% { transform: translateX(-6px); } 75% { transform: translateX(6px); } }

  .match-status {
    text-align: center; margin-bottom: 12px; color: var(--muted); font-size: 14px;
  }
  .match-status .time { color: var(--accent); font-weight: 700; }
  .match-done {
    background: rgba(34,197,94,0.15);
    border: 1px solid var(--good);
    padding: 20px;
    border-radius: 16px;
    text-align: center;
  }
  .match-done h3 { margin: 0 0 8px; color: var(--good); }

  /* ---------- MULTIPLE CHOICE ---------- */
  .mc-question {
    background: var(--card);
    color: var(--text-dark);
    padding: 24px;
    border-radius: 16px;
    text-align: center;
    margin-bottom: 16px;
    min-height: 120px;
    display: flex; align-items: center; justify-content: center;
  }
  .mc-question .word { font-size: 32px; font-weight: 700; line-height: 1.3; word-break: break-word; }
  .mc-question .word.ar { font-family: "Noto Sans Arabic", "Cairo", sans-serif; font-size: 38px; font-weight: 600; }
  .mc-options {
    display: grid; gap: 10px;
    grid-template-columns: 1fr;
  }
  .mc-option {
    background: rgba(255,255,255,0.06);
    color: var(--text);
    padding: 14px;
    border-radius: 12px;
    font-size: 16px;
    font-weight: 600;
    text-align: center;
    border: 2px solid transparent;
    transition: all .15s;
    word-break: break-word;
  }
  .mc-option.ar { font-family: "Noto Sans Arabic", "Cairo", sans-serif; font-size: 18px; font-weight: 600; }
  .mc-option:hover { background: rgba(255,255,255,0.12); }
  .mc-option.correct { background: rgba(34,197,94,0.25); border-color: var(--good); color: #bbf7d0; }
  .mc-option.wrong { background: rgba(239,68,68,0.22); border-color: var(--bad); color: #fecaca; }
  .mc-next-btn {
    margin-top: 14px;
    padding: 14px;
    border-radius: 12px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    color: #fff;
    font-size: 16px; font-weight: 700;
    width: 100%;
    display: none;
  }
  .mc-next-btn.show { display: block; }

  .mc-score {
    display: flex; justify-content: space-between; color: var(--muted); font-size: 14px; margin-bottom: 10px;
  }
  .mc-score span b { color: var(--text); }

  /* ---------- LIST MODE ---------- */
  .list-controls {
    display: flex;
    gap: 6px;
    margin-bottom: 10px;
    flex-wrap: wrap;
  }
  .list-controls button {
    flex: 1 1 auto;
    min-width: 0;
    padding: 8px 10px;
    border-radius: 10px;
    background: rgba(255,255,255,0.06);
    color: var(--text);
    font-size: 13px;
    font-weight: 600;
    transition: all .15s;
    border: 2px solid transparent;
    white-space: nowrap;
  }
  .list-controls button.active {
    background: rgba(56,189,248,0.15);
    border-color: var(--accent);
    color: var(--accent);
  }
  .list-controls .btn-export {
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    color: #fff;
    border: none;
    flex: 0 0 auto;
  }
  .list-table {
    background: var(--card);
    color: var(--text-dark);
    border-radius: 14px;
    overflow: hidden;
    flex: 1;
    overflow-y: auto;
    box-shadow: 0 6px 20px rgba(0,0,0,0.2);
  }
  .list-row, .list-header {
    display: grid;
    grid-template-columns: 40px 1fr 1fr;
    align-items: center;
    padding: 10px 8px;
    border-bottom: 1px solid #e5e7eb;
    gap: 8px;
  }
  .list-row:last-child { border-bottom: none; }
  .list-row:nth-child(even) { background: #f8fafc; }
  .list-header {
    background: #1e293b;
    color: var(--text);
    font-weight: 700;
    font-size: 13px;
    position: sticky; top: 0;
    z-index: 2;
  }
  .list-num {
    color: #64748b;
    font-size: 13px;
    text-align: center;
    font-weight: 600;
  }
  .list-ar {
    font-family: "Noto Sans Arabic", "Cairo", sans-serif;
    font-size: 18px;
    font-weight: 600;
    line-height: 1.5;
    word-break: break-word;
    direction: rtl;
    text-align: right;
  }
  .list-he {
    font-size: 15px;
    font-weight: 500;
    line-height: 1.4;
    word-break: break-word;
    direction: rtl;
    text-align: right;
    color: #334155;
  }
  .list-hidden {
    color: #cbd5e1;
    letter-spacing: 4px;
    cursor: pointer;
    user-select: none;
  }
  .list-hidden:hover { color: #64748b; }
  .list-hidden.revealed {
    color: #0f172a;
    letter-spacing: normal;
  }

  /* ---------- FILL-IN-THE-BLANK MODE ---------- */
  .fill-prompt {
    background: var(--card);
    color: var(--text-dark);
    padding: 20px;
    border-radius: 16px;
    margin-bottom: 14px;
  }
  .fill-prompt .label {
    font-size: 11px;
    letter-spacing: 1px;
    color: #64748b;
    font-weight: 700;
    margin-bottom: 8px;
  }
  .fill-prompt .hint-text {
    font-size: 18px;
    font-weight: 600;
    line-height: 1.4;
    margin-bottom: 14px;
    word-break: break-word;
  }
  .fill-prompt .hint-text.ar {
    font-family: "Noto Sans Arabic", "Cairo", sans-serif;
    font-size: 22px;
  }
  .fill-prompt .sentence {
    font-size: 20px;
    line-height: 1.7;
    word-break: break-word;
    padding: 14px;
    background: #f1f5f9;
    border-radius: 10px;
  }
  .fill-prompt .sentence.ar {
    font-family: "Noto Sans Arabic", "Cairo", sans-serif;
    font-size: 24px;
    font-weight: 600;
    direction: rtl;
  }
  .fill-prompt .blank {
    display: inline-block;
    min-width: 80px;
    border-bottom: 3px solid #3b82f6;
    padding: 0 10px;
    margin: 0 4px;
    color: #3b82f6;
    font-weight: 700;
  }
  .fill-prompt .blank.revealed-correct { color: var(--good); border-color: var(--good); background: rgba(34,197,94,0.1); }
  .fill-prompt .blank.revealed-wrong { color: var(--bad); border-color: var(--bad); background: rgba(239,68,68,0.08); }
  .fill-input-row {
    display: flex;
    gap: 8px;
    margin-bottom: 10px;
  }
  .fill-input-row input {
    flex: 1;
    background: rgba(255,255,255,0.08);
    color: var(--text);
    border: 2px solid rgba(255,255,255,0.15);
    border-radius: 12px;
    padding: 14px;
    font-size: 20px;
    outline: none;
    text-align: center;
    font-family: inherit;
    direction: rtl;
  }
  .fill-input-row input.ar { font-family: "Noto Sans Arabic","Cairo",sans-serif; font-weight:600; }
  .fill-input-row input:focus { border-color: var(--accent); }
  .fill-input-row input.correct { border-color: var(--good); background: rgba(34,197,94,0.15); }
  .fill-input-row input.wrong { border-color: var(--bad); background: rgba(239,68,68,0.12); }
  .fill-input-row button {
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    color: #fff;
    padding: 0 22px;
    border-radius: 12px;
    font-size: 16px;
    font-weight: 700;
  }
  .fill-feedback {
    padding: 12px;
    border-radius: 10px;
    margin-bottom: 10px;
    text-align: center;
    font-size: 14px;
    font-weight: 600;
  }
  .fill-feedback.correct { background: rgba(34,197,94,0.15); color: var(--good); }
  .fill-feedback.wrong { background: rgba(239,68,68,0.15); color: var(--bad); }
  .fill-feedback .correct-answer {
    display: block;
    font-size: 20px;
    font-family: "Noto Sans Arabic","Cairo",sans-serif;
    margin-top: 4px;
    color: var(--text);
    direction: rtl;
  }
  .fill-actions {
    display: flex; gap: 8px;
  }
  .fill-actions button {
    flex: 1;
    padding: 12px;
    border-radius: 10px;
    background: rgba(255,255,255,0.08);
    color: var(--text);
    font-size: 14px; font-weight: 600;
  }
  .fill-actions .primary {
    background: linear-gradient(90deg, var(--accent), var(--accent2));
  }
  /* Settings row for fill-mode options */
  .fill-mode-toggles {
    display: flex;
    gap: 8px;
    margin-bottom: 10px;
    flex-wrap: wrap;
  }
  .fill-mode-toggles .toggle-group {
    display: inline-flex;
    background: rgba(255,255,255,0.06);
    border-radius: 10px;
    padding: 3px;
    gap: 2px;
    flex: 1;
    min-width: 0;
  }
  .fill-mode-toggles .toggle-group button {
    flex: 1;
    padding: 6px 8px;
    font-size: 12px;
    border-radius: 7px;
    color: var(--muted);
    background: transparent;
    font-weight: 600;
    white-space: nowrap;
  }
  .fill-mode-toggles .toggle-group button.active {
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    color: #fff;
  }
  .fill-mode-toggles .toggle-label {
    font-size: 10px;
    color: var(--muted);
    margin-bottom: 3px;
    text-align: center;
    font-weight: 600;
    letter-spacing: .5px;
  }
  .fill-mode-toggles .toggle-wrap {
    display: flex; flex-direction: column; flex: 1; min-width: 120px;
  }
  /* Multi-blank input/MC containers */
  .fill-blanks {
    display: flex; flex-direction: column;
    gap: 10px;
    margin-bottom: 10px;
  }
  .fill-blank-group {
    background: rgba(255,255,255,0.04);
    border-radius: 10px;
    padding: 10px;
  }
  .fill-blank-group .blank-label {
    font-size: 11px;
    color: var(--muted);
    font-weight: 700;
    margin-bottom: 6px;
    letter-spacing: .5px;
  }
  .fill-blank-group input {
    width: 100%;
    background: rgba(255,255,255,0.08);
    color: var(--text);
    border: 2px solid rgba(255,255,255,0.15);
    border-radius: 10px;
    padding: 12px;
    font-size: 18px;
    outline: none;
    text-align: center;
    font-family: inherit;
    direction: rtl;
  }
  .fill-blank-group input.ar { font-family: "Noto Sans Arabic","Cairo",sans-serif; font-weight:600; }
  .fill-blank-group input:focus { border-color: var(--accent); }
  .fill-blank-group input.correct { border-color: var(--good); background: rgba(34,197,94,0.15); }
  .fill-blank-group input.wrong { border-color: var(--bad); background: rgba(239,68,68,0.12); }
  .fill-options-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 6px;
  }
  .fill-option-btn {
    padding: 10px 8px;
    border-radius: 8px;
    background: rgba(255,255,255,0.08);
    color: var(--text);
    font-size: 15px;
    direction: rtl;
    text-align: center;
    font-weight: 600;
    min-height: 42px;
  }
  .fill-option-btn.ar { font-family: "Noto Sans Arabic", "Cairo", sans-serif; font-size: 17px; }
  .fill-option-btn.selected { border: 2px solid var(--accent); background: rgba(59,130,246,0.25); }
  .fill-option-btn.correct { background: rgba(34,197,94,0.25); border: 2px solid var(--good); }
  .fill-option-btn.wrong { background: rgba(239,68,68,0.25); border: 2px solid var(--bad); }
  .fill-option-btn.disabled { opacity: 0.5; cursor: default; }
  /* Submit bar */
  .fill-submit-bar {
    margin-bottom: 10px;
  }
  .fill-submit-bar button {
    width: 100%;
    padding: 14px;
    border-radius: 12px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    color: #fff;
    font-weight: 700;
    font-size: 16px;
  }
  .fill-submit-bar button:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  /* ---------- SEARCH ---------- */
  .search-row {
    display: flex;
    align-items: center;
    background: rgba(255,255,255,0.06);
    border-radius: 10px;
    padding: 8px 12px;
    margin-bottom: 10px;
    gap: 6px;
  }
  .search-row input {
    flex: 1;
    background: transparent;
    border: none;
    color: var(--text);
    font-size: 14px;
    outline: none;
    padding: 4px;
    direction: rtl;
  }
  .search-row button {
    background: transparent;
    color: var(--muted);
    font-size: 16px;
    padding: 2px 6px;
  }

  /* ---------- TOUCH GESTURE FEEDBACK ---------- */
  .card.dragging { transition: none !important; }
  .swipe-hint {
    position: absolute;
    top: 50%;
    font-size: 48px;
    opacity: 0;
    transform: translateY(-50%);
    pointer-events: none;
    transition: opacity .1s;
    font-weight: 900;
    text-shadow: 0 4px 10px rgba(0,0,0,0.2);
  }
  .swipe-hint.good { inset-inline-start: 24px; color: #22c55e; }
  .swipe-hint.bad { inset-inline-end: 24px; color: #ef4444; }

  /* ---------- EMPTY STATE ---------- */
  .empty {
    text-align: center;
    padding: 40px 20px;
    color: var(--muted);
  }
  .empty .emoji { font-size: 44px; display: block; margin-bottom: 10px; }

  /* ---------- MODAL ---------- */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.6);
    display: flex; align-items: flex-end; justify-content: center;
    z-index: 100;
    animation: fadeIn .2s;
  }
  .modal {
    background: var(--bg2);
    color: var(--text);
    width: 100%; max-width: 600px;
    max-height: 90vh;
    border-radius: 20px 20px 0 0;
    padding: 20px;
    overflow-y: auto;
    animation: slideUp .25s;
  }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: none; } }
  .modal h2 { margin: 0 0 12px; font-size: 20px; }
  .modal .close-x {
    position: absolute; top: 14px; inset-inline-end: 14px;
    background: none; color: var(--muted); font-size: 24px;
  }
  .modal label {
    display: block; font-size: 13px; color: var(--muted); margin: 12px 0 6px;
  }
  .modal input, .modal textarea, .modal select {
    width: 100%;
    background: rgba(255,255,255,0.06);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 12px;
    font-size: 15px;
    outline: none;
  }
  .modal textarea { min-height: 140px; font-family: inherit; direction: rtl; }
  .modal .btn-primary {
    width: 100%;
    padding: 14px;
    margin-top: 16px;
    border-radius: 12px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    color: #fff; font-weight: 700; font-size: 16px;
  }
  .modal .btn-secondary {
    width: 100%;
    padding: 12px;
    margin-top: 8px;
    border-radius: 12px;
    background: rgba(255,255,255,0.08);
    color: var(--text); font-weight: 600;
  }
  .modal .btn-danger {
    width: 100%;
    padding: 12px;
    margin-top: 8px;
    border-radius: 12px;
    background: rgba(239,68,68,0.18);
    color: #fca5a5; font-weight: 600;
  }

  .deck-list-item {
    padding: 12px;
    background: rgba(255,255,255,0.04);
    border-radius: 10px;
    margin-bottom: 8px;
    display: flex; justify-content: space-between; align-items: center;
    gap: 8px;
  }
  .deck-list-item .info { flex: 1; min-width: 0; }
  .deck-list-item .info .name { font-weight: 600; }
  .deck-list-item .info .meta { font-size: 12px; color: var(--muted); }
  .deck-list-item .actions { display: flex; gap: 6px; }
  .deck-list-item button {
    background: rgba(255,255,255,0.08); color: var(--text);
    padding: 6px 10px; border-radius: 8px; font-size: 13px;
  }

  .card-list-item {
    display: grid; grid-template-columns: 1fr 1fr auto; gap: 8px; align-items: center;
    padding: 8px; background: rgba(255,255,255,0.03); border-radius: 8px; margin-bottom: 6px;
  }
  .card-list-item .ar { font-family: "Noto Sans Arabic", "Cairo", sans-serif; font-weight: 600; direction: rtl; }
  .card-list-item .he { direction: rtl; }
  .card-list-item button { background: transparent; color: var(--bad); font-size: 16px; padding: 4px 8px; }

  .tip {
    font-size: 12px; color: var(--muted); margin-top: 6px; line-height: 1.4;
  }

  /* Toast */
  .toast {
    position: fixed; bottom: 24px; inset-inline: 0;
    margin: 0 auto;
    max-width: 300px;
    background: rgba(15,23,42,0.95);
    color: var(--text);
    padding: 10px 16px;
    border-radius: 24px;
    text-align: center;
    font-size: 14px;
    animation: fadeIn .2s;
    z-index: 200;
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  }
</style>
</head>
<body>
<div id="app">
  <div class="topbar">
    <button class="icon-btn" id="btn-decks" title="ניהול חפיסות">📚</button>
    <h1>קוויזלטים לבגרות</h1>
    <button class="icon-btn" id="btn-settings" title="הגדרות">⚙️</button>
  </div>

  <div class="dir-toggle" id="dir-toggle">
    <button data-dir="he2ar">עברית → ערבית</button>
    <button data-dir="ar2he" class="active">ערבית → עברית</button>
  </div>

  <div class="deck-row">
    <span>📖</span>
    <select id="deck-select"></select>
    <span class="deck-count" id="deck-count"></span>
  </div>

  <div class="modes">
    <button class="mode-btn active" data-mode="flash"><span class="emoji">🃏</span>כרטיסיות</button>
    <button class="mode-btn" data-mode="list"><span class="emoji">📋</span>רשימה</button>
    <button class="mode-btn" data-mode="fill"><span class="emoji">🔤</span>השלמה</button>
    <button class="mode-btn" data-mode="match"><span class="emoji">🧩</span>התאמה</button>
    <button class="mode-btn" data-mode="mc"><span class="emoji">❓</span>אמריקאי</button>
  </div>

  <div class="filter-row" id="filter-row"></div>

  <div id="screen" class="screen"></div>
</div>

<div id="modal-host"></div>
<div id="toast-host"></div>

<script src="decks.js"></script>
<script>
(function(){
  'use strict';

  // ---------- STATE ----------
  const LS_KEY = 'quizlet_he_ar_v1';
  const SCHEMA = 3;
  const state = load() || {
    schema: SCHEMA,
    direction: 'ar2he',   // ar2he or he2ar
    mode: 'flash',
    filter: 'all',        // 'all' or 'hard'
    order: 'sequential',  // 'shuffled' or 'sequential' (default: sequential per file order)
    fillBlanksCount: 1,   // 1, 2, 3, or 'max'
    fillInputMode: 'mc',  // 'type' or 'mc' (default: mc / אמריקאי)
    currentDeckId: null,
    customDecks: [],
    difficult: {},        // { deckId: [cardKey, ...] }
    progress: {},         // { deckId: { cardKey: { known: n, seen: n } } }
  };
  // Backfill fields for older saved state
  if (!state.difficult) state.difficult = {};
  if (!state.filter) state.filter = 'all';
  if (!state.order) state.order = 'sequential';
  if (state.fillBlanksCount == null) state.fillBlanksCount = 1;
  if (!state.fillInputMode) state.fillInputMode = 'mc';
  // Migration: schema 1 → 2 — make order default "sequential" unless user already chose otherwise
  let _migrated = false;
  if (!state.schema || state.schema < 2) {
    // If they had the old default 'shuffled', flip to the new default.
    // (Users who changed to 'sequential' keep it either way.)
    if (state.order === 'shuffled') state.order = 'sequential';
    state.schema = 2;
    _migrated = true;
  }
  // Migration: schema 2 → 3 — flip default fill input mode to 'mc' (אמריקאי)
  // for users who are still on the previous default of 'type'.
  if (state.schema < 3) {
    if (state.fillInputMode === 'type') state.fillInputMode = 'mc';
    state.schema = 3;
    _migrated = true;
  }
  // Strip legacy TTS fields if present from an older build
  delete state.ttsAuto;
  delete state.ttsRate;

  function save() {
    try { localStorage.setItem(LS_KEY, JSON.stringify(state)); }
    catch(e){ console.warn('Save failed', e); }
  }
  function load() {
    try {
      const s = localStorage.getItem(LS_KEY);
      if (!s) return null;
      return JSON.parse(s);
    } catch(e){ return null; }
  }
  // Persist migrations immediately so they don't run every load
  if (_migrated) save();

  function allDecks() {
    return [...(window.DEFAULT_DECKS || []), ...state.customDecks];
  }
  function currentDeck() {
    return allDecks().find(d => d.id === state.currentDeckId) || allDecks()[0];
  }
  function isCustomDeck(id) {
    return state.customDecks.some(d => d.id === id);
  }

  // Hard-cards tracking
  function cardKey(card) { return (card.ar || '') + '|' + (card.he || ''); }
  function hardSet(deckId) {
    return new Set(state.difficult[deckId] || []);
  }
  function setHard(deckId, set) {
    state.difficult[deckId] = Array.from(set);
    save();
  }
  function markHard(deckId, card) {
    const s = hardSet(deckId); s.add(cardKey(card)); setHard(deckId, s);
  }
  function unmarkHard(deckId, card) {
    const s = hardSet(deckId); s.delete(cardKey(card)); setHard(deckId, s);
  }
  function clearHard(deckId) {
    delete state.difficult[deckId]; save();
  }
  // Returns the cards the user is studying now (respects filter)
  function activeCards() {
    const deck = currentDeck();
    if (!deck) return [];
    if (state.filter === 'hard') {
      const hs = hardSet(deck.id);
      return deck.cards.filter(c => hs.has(cardKey(c)));
    }
    return deck.cards;
  }

  // Setup first deck
  if (!state.currentDeckId && allDecks().length) {
    state.currentDeckId = allDecks()[0].id;
  }

  // ---------- UI HELPERS ----------
  const $ = (sel) => document.querySelector(sel);
  const screen = $('#screen');
  const toastHost = $('#toast-host');
  const modalHost = $('#modal-host');

  function toast(msg, ms) {
    toastHost.innerHTML = '';
    const el = document.createElement('div');
    el.className = 'toast';
    el.textContent = msg;
    toastHost.appendChild(el);
    setTimeout(() => el.remove(), ms || 1800);
  }

  function shuffle(arr) {
    const a = arr.slice();
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  // ---------- TEXT NORMALIZATION (for search & fill comparison) ----------
  function stripArabicDiacritics(s) {
    // Remove fatha, kasra, damma, sukun, shadda, tanweens, dagger alef, etc.
    return (s || '').replace(/[\u064B-\u0652\u0670\u06D6-\u06ED]/g, '');
  }
  function normalizeForCompare(s, lang) {
    let t = (s || '').trim();
    if (lang === 'ar') {
      t = stripArabicDiacritics(t);
      t = t.replace(/[إأآ]/g, 'ا');
      t = t.replace(/ى/g, 'ي');
      t = t.replace(/ة/g, 'ه');
    }
    // strip common punctuation
    t = t.replace(/[.,;:!?()'"«»،؟٬٫\u2018\u2019\u201C\u201D\u2026]/g, '');
    return t.trim().toLowerCase();
  }
  function matchesSearch(card, query) {
    if (!query) return true;
    const q = normalizeForCompare(query, 'ar');
    const qHe = normalizeForCompare(query, 'he');
    const ar = normalizeForCompare(card.ar, 'ar');
    const he = normalizeForCompare(card.he, 'he');
    return ar.includes(q) || he.includes(qHe);
  }

  // Returns indices [0..n-1] either shuffled or in order, per current setting
  function makeOrder(n) {
    const idx = Array.from({length: n}, (_, i) => i);
    return state.order === 'sequential' ? idx : shuffle(idx);
  }

  function question(card) {
    return state.direction === 'ar2he' ? card.ar : card.he;
  }
  function answer(card) {
    return state.direction === 'ar2he' ? card.he : card.ar;
  }
  function qLangClass() { return state.direction === 'ar2he' ? 'ar' : 'he'; }
  function aLangClass() { return state.direction === 'ar2he' ? 'he' : 'ar'; }
  function qLangLabel() { return state.direction === 'ar2he' ? 'ערבית' : 'עברית'; }
  function aLangLabel() { return state.direction === 'ar2he' ? 'עברית' : 'ערבית'; }

  // ---------- TOP CONTROLS ----------
  function renderDeckSelect() {
    const sel = $('#deck-select');
    sel.innerHTML = '';
    allDecks().forEach(d => {
      const opt = document.createElement('option');
      opt.value = d.id;
      opt.textContent = d.name + ' (' + d.cards.length + ')';
      if (d.id === state.currentDeckId) opt.selected = true;
      sel.appendChild(opt);
    });
    const deck = currentDeck();
    $('#deck-count').textContent = deck ? (deck.cards.length + ' כרטיסים') : '';
  }

  function renderFilterRow() {
    const row = $('#filter-row');
    const deck = currentDeck();
    if (!deck) { row.innerHTML = ''; return; }
    const hardCount = hardSet(deck.id).size;
    const totalCount = deck.cards.length;
    row.innerHTML = `
      <button class="filter-btn all ${state.filter==='all'?'active':''}" data-f="all">
        כל הכרטיסים <span class="count">${totalCount}</span>
      </button>
      <button class="filter-btn ${state.filter==='hard'?'active':''}" data-f="hard" ${hardCount===0?'disabled':''}>
        🔖 לא ידעתי <span class="count">${hardCount}</span>
      </button>
      ${hardCount > 0 ? '<button class="reset-hard" id="btn-clear-hard" title="נקה רשימה">🗑</button>' : ''}
    `;
    row.querySelectorAll('.filter-btn').forEach(b => {
      b.addEventListener('click', () => {
        if (b.disabled) return;
        state.filter = b.dataset.f; save(); render();
      });
    });
    const clearBtn = document.getElementById('btn-clear-hard');
    if (clearBtn) clearBtn.addEventListener('click', () => {
      if (confirm('למחוק את רשימת "לא ידעתי" בחפיסה הנוכחית?')) {
        clearHard(deck.id);
        if (state.filter === 'hard') state.filter = 'all';
        render();
      }
    });
  }

  function setDirection(dir) {
    state.direction = dir;
    document.querySelectorAll('#dir-toggle button').forEach(b => {
      b.classList.toggle('active', b.dataset.dir === dir);
    });
    save();
    render();
  }

  function setMode(mode) {
    state.mode = mode;
    document.querySelectorAll('.mode-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.mode === mode);
    });
    save();
    render();
  }

  // Event bindings for top bar
  document.querySelectorAll('#dir-toggle button').forEach(b => {
    b.addEventListener('click', () => setDirection(b.dataset.dir));
  });
  document.querySelectorAll('.mode-btn').forEach(b => {
    b.addEventListener('click', () => setMode(b.dataset.mode));
  });
  $('#deck-select').addEventListener('change', (e) => {
    state.currentDeckId = e.target.value;
    save();
    renderDeckSelect();
    render();
  });
  $('#btn-decks').addEventListener('click', openDeckManager);
  $('#btn-settings').addEventListener('click', openSettings);

  // ---------- FLASHCARD MODE ----------
  let flashState = null;
  function renderFlash() {
    const deck = currentDeck();
    const cards = activeCards();
    if (!deck || !cards.length) { renderEmpty(); return; }
    const sessionKey = deck.id + '|' + state.filter + '|' + state.order + '|' + cards.length;
    if (!flashState || flashState.sessionKey !== sessionKey) {
      flashState = {
        sessionKey,
        deckId: deck.id,
        cards: cards.slice(),
        order: makeOrder(cards.length),
        idx: 0,
        flipped: false,
        knownCount: 0,
      };
    }
    const card = flashState.cards[flashState.order[flashState.idx]];
    const total = flashState.order.length;
    const pos = flashState.idx + 1;
    const progPct = Math.round((flashState.idx / total) * 100);

    screen.innerHTML = `
      <div class="flash-progress">
        ${pos} / ${total} &nbsp;·&nbsp; יודע: ${flashState.knownCount}
        <div class="bar"><div class="fill" style="width:${progPct}%"></div></div>
      </div>
      <div class="card-wrap" style="position:relative;">
        <div class="card${flashState.flipped ? ' flipped' : ''}" id="flash-card">
          <div class="face front">
            <span class="lang-label">${qLangLabel()}</span>
            <div class="word ${qLangClass()}">${escapeHtml(question(card))}</div>
            <div class="hint">הקש להיפוך · החלק ימין/שמאל לסימון</div>
          </div>
          <div class="face back">
            <span class="lang-label">${aLangLabel()}</span>
            <div class="word ${aLangClass()}">${escapeHtml(answer(card))}</div>
            <div class="hint">הקש לחזור</div>
          </div>
        </div>
        <div class="swipe-hint good" id="swipe-hint-good">✓</div>
        <div class="swipe-hint bad" id="swipe-hint-bad">✗</div>
      </div>
      <div class="flash-controls">
        <button class="btn-dunno" id="btn-dunno">🔁 לא יודע</button>
        <button class="btn-know" id="btn-know">✔ יודע</button>
      </div>
      <div class="flash-nav">
        <button id="btn-prev">◀ הקודם</button>
        <button id="btn-order" title="החלף סדר">${state.order === 'sequential' ? '🔀 ערבב' : '📋 לפי סדר הקובץ'}</button>
        <button id="btn-next">הבא ▶</button>
      </div>
    `;
    attachFlashGestures();
    $('#btn-know').addEventListener('click', () => {
      flashState.knownCount++;
      unmarkHard(flashState.deckId, card);
      renderFilterRow();
      advanceFlash();
    });
    $('#btn-dunno').addEventListener('click', () => {
      markHard(flashState.deckId, card);
      renderFilterRow();
      advanceFlash();
    });
    $('#btn-next').addEventListener('click', () => advanceFlash());
    $('#btn-prev').addEventListener('click', () => {
      if (flashState.idx > 0) flashState.idx--;
      flashState.flipped = false;
      renderFlash();
    });
    $('#btn-order').addEventListener('click', () => {
      state.order = (state.order === 'sequential') ? 'shuffled' : 'sequential';
      save();
      flashState = null; renderFlash();
      toast(state.order === 'sequential' ? '📋 לפי סדר הקובץ' : '🔀 עורבב');
    });
  }
  function attachFlashGestures() {
    const card = $('#flash-card');
    const hintGood = $('#swipe-hint-good');
    const hintBad = $('#swipe-hint-bad');
    if (!card) return;

    let startX = null, startY = null, dx = 0, dy = 0, dragging = false, moved = false;
    const THRESHOLD = 80;   // px to trigger action
    const CLICK_THRESHOLD = 8; // px — below that counts as a tap

    function onStart(e) {
      const t = e.touches ? e.touches[0] : e;
      startX = t.clientX; startY = t.clientY;
      dx = 0; dy = 0; moved = false; dragging = true;
      card.classList.add('dragging');
    }
    function onMove(e) {
      if (!dragging) return;
      const t = e.touches ? e.touches[0] : e;
      dx = t.clientX - startX; dy = t.clientY - startY;
      if (Math.abs(dx) > CLICK_THRESHOLD || Math.abs(dy) > CLICK_THRESHOLD) moved = true;
      // Only treat as horizontal swipe if dx dominates
      if (Math.abs(dx) > Math.abs(dy) && moved) {
        e.preventDefault && e.preventDefault();
        card.style.transform = `translateX(${dx}px) rotate(${dx/30}deg)`;
        const ratio = Math.min(1, Math.abs(dx) / THRESHOLD);
        if (dx > 0) { hintGood.style.opacity = ratio; hintBad.style.opacity = 0; }
        else        { hintBad.style.opacity = ratio;  hintGood.style.opacity = 0; }
      }
    }
    function onEnd() {
      if (!dragging) return;
      dragging = false;
      card.classList.remove('dragging');
      hintGood.style.opacity = 0; hintBad.style.opacity = 0;
      card.style.transform = '';

      // Tap → flip
      if (!moved) {
        flashState.flipped = !flashState.flipped;
        card.classList.toggle('flipped', flashState.flipped);
        return;
      }
      // Horizontal swipe beyond threshold
      if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > THRESHOLD) {
        if (dx > 0) {
          // Swipe right → "יודע"
          const kb = $('#btn-know'); if (kb) kb.click();
        } else {
          // Swipe left → "לא יודע"
          const db = $('#btn-dunno'); if (db) db.click();
        }
      }
    }

    card.addEventListener('touchstart', onStart, { passive: true });
    card.addEventListener('touchmove', onMove, { passive: false });
    card.addEventListener('touchend', onEnd);
    card.addEventListener('touchcancel', onEnd);
    card.addEventListener('mousedown', onStart);
    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup', onEnd);
  }

  function advanceFlash() {
    flashState.flipped = false;
    if (flashState.idx < flashState.order.length - 1) {
      flashState.idx++;
      renderFlash();
    } else {
      // Session done
      const remaining = hardSet(flashState.deckId).size;
      const extra = (state.filter === 'hard' && remaining === 0)
        ? '<div style="margin-top:8px;color:var(--good);font-weight:700">ניקית את רשימת "לא ידעתי"! 🏆</div>'
        : (state.filter === 'hard' ? `<div style="margin-top:8px;color:var(--muted)">נותרו ${remaining} מילים קשות</div>` : '');
      screen.innerHTML = `
        <div class="match-done">
          <h3>🎉 כל הכבוד!</h3>
          <div>סיימת את החפיסה. ידעת ${flashState.knownCount} מתוך ${flashState.order.length}.</div>
          ${extra}
          <button class="btn-primary" id="flash-restart" style="margin-top:14px;background:linear-gradient(90deg,var(--accent),var(--accent2));color:#fff;padding:12px;border-radius:12px;font-weight:700;width:100%;">התחל שוב</button>
        </div>
      `;
      $('#flash-restart').addEventListener('click', () => { flashState = null; render(); });
    }
  }

  // ---------- MATCH MODE ----------
  let matchState = null;
  function renderMatch() {
    const deck = currentDeck();
    const cards = activeCards();
    if (!deck || cards.length < 3) {
      screen.innerHTML = `<div class="empty"><span class="emoji">🧩</span>צריך לפחות 3 כרטיסים${state.filter==='hard'?' ברשימת "לא ידעתי"':' בחפיסה'}<br/>למשחק התאמה.</div>`;
      return;
    }
    const sessionKey = deck.id + '|' + state.filter + '|' + cards.length;
    if (!matchState || matchState.sessionKey !== sessionKey) {
      startMatch(deck, cards, sessionKey);
    }
    drawMatch();
  }
  function startMatch(deck, cards, sessionKey) {
    const sampleSize = Math.min(6, cards.length);
    const picked = shuffle(cards).slice(0, sampleSize);
    const items = [];
    picked.forEach((c, i) => {
      items.push({ id: 'q'+i, pairId: i, text: question(c), lang: qLangClass() });
      items.push({ id: 'a'+i, pairId: i, text: answer(c),   lang: aLangClass() });
    });
    matchState = {
      sessionKey,
      deckId: deck.id,
      items: shuffle(items),
      matched: new Set(),
      selected: null,
      wrong: null,
      startTime: Date.now(),
      finishedTime: null,
    };
  }
  function drawMatch() {
    const st = matchState;
    const total = st.items.length / 2;
    const doneCount = st.matched.size / 2;
    const time = Math.round(((st.finishedTime || Date.now()) - st.startTime) / 1000);

    let html = `
      <div class="match-status">
        הותאמו: <b>${doneCount}/${total}</b> &nbsp;·&nbsp; זמן: <span class="time">${time}s</span>
      </div>
      <div class="match-grid">
    `;
    st.items.forEach(it => {
      const cls = [
        'match-item',
        it.lang,
        st.matched.has(it.id) ? 'matched' : '',
        st.selected === it.id ? 'selected' : '',
        st.wrong && st.wrong.includes(it.id) ? 'wrong' : '',
      ].filter(Boolean).join(' ');
      html += `<div class="${cls}" data-id="${it.id}">${escapeHtml(it.text)}</div>`;
    });
    html += `</div>`;

    if (doneCount === total) {
      html += `
        <div class="match-done">
          <h3>🎉 סיימת ב-${time} שניות!</h3>
          <button class="btn-primary" id="match-again" style="margin-top:10px;background:linear-gradient(90deg,var(--accent),var(--accent2));color:#fff;padding:12px;border-radius:12px;font-weight:700;width:100%;">סבב חדש</button>
        </div>
      `;
    }

    screen.innerHTML = html;
    screen.querySelectorAll('.match-item:not(.matched)').forEach(el => {
      el.addEventListener('click', () => matchClick(el.dataset.id));
    });
    const again = document.getElementById('match-again');
    if (again) again.addEventListener('click', () => { matchState = null; renderMatch(); });
  }
  function matchClick(id) {
    const st = matchState;
    if (st.matched.has(id)) return;
    if (st.wrong) return;  // waiting to clear
    if (st.selected === id) { st.selected = null; drawMatch(); return; }
    if (!st.selected) { st.selected = id; drawMatch(); return; }

    const a = st.items.find(x => x.id === st.selected);
    const b = st.items.find(x => x.id === id);
    if (a.pairId === b.pairId && a.id !== b.id) {
      st.matched.add(a.id); st.matched.add(b.id);
      st.selected = null;
      if (st.matched.size === st.items.length) st.finishedTime = Date.now();
      drawMatch();
    } else {
      st.wrong = [a.id, b.id];
      drawMatch();
      setTimeout(() => {
        st.wrong = null; st.selected = null; drawMatch();
      }, 500);
    }
  }

  // ---------- MULTIPLE CHOICE ----------
  let mcState = null;
  function renderMC() {
    const deck = currentDeck();
    const cards = activeCards();
    if (!deck || cards.length < 4) {
      // Fall back: if filter is hard but too few, need distractors from full deck
      if (deck && state.filter === 'hard' && cards.length >= 1 && deck.cards.length >= 4) {
        // allow MC with few hard cards, using full deck for distractors
      } else {
        screen.innerHTML = `<div class="empty"><span class="emoji">❓</span>צריך לפחות 4 כרטיסים${state.filter==='hard'?' ברשימת "לא ידעתי"':' בחפיסה'}<br/>למצב אמריקאי.</div>`;
        return;
      }
    }
    const sessionKey = deck.id + '|' + state.filter + '|' + state.order + '|' + cards.length;
    if (!mcState || mcState.sessionKey !== sessionKey) {
      mcState = {
        sessionKey,
        deckId: deck.id,
        cards: cards.slice(),
        order: makeOrder(cards.length),
        idx: 0,
        correct: 0,
        wrong: 0,
        answered: false,
        chosen: null,
      };
    }
    drawMC();
  }
  function drawMC() {
    const deck = currentDeck();
    const st = mcState;
    if (st.idx >= st.order.length) {
      screen.innerHTML = `
        <div class="match-done">
          <h3>🎉 סיימת!</h3>
          <div>נכון: ${st.correct} &nbsp;·&nbsp; שגוי: ${st.wrong}</div>
          <div style="margin-top:8px;color:var(--muted)">ציון: ${Math.round(st.correct/(st.correct+st.wrong)*100)}%</div>
          <button class="btn-primary" id="mc-again" style="margin-top:14px;background:linear-gradient(90deg,var(--accent),var(--accent2));color:#fff;padding:12px;border-radius:12px;font-weight:700;width:100%;">התחל שוב</button>
        </div>
      `;
      document.getElementById('mc-again').addEventListener('click', () => { mcState = null; render(); });
      return;
    }
    const card = st.cards[st.order[st.idx]];
    // Generate 3 distractors from the FULL deck (so hard-filter has enough)
    const others = deck.cards.filter(c => c !== card);
    const distractors = shuffle(others).slice(0, 3);
    // Build options if not yet built for this question
    if (!st.options || st.questionIdx !== st.idx) {
      const opts = shuffle([card, ...distractors]);
      st.options = opts;
      st.questionIdx = st.idx;
      st.answered = false;
      st.chosen = null;
    }

    let html = `
      <div class="mc-score">
        <span>שאלה <b>${st.idx+1}/${st.order.length}</b></span>
        <span>נכון: <b style="color:var(--good)">${st.correct}</b> · שגוי: <b style="color:var(--bad)">${st.wrong}</b></span>
      </div>
      <div class="mc-question">
        <div class="word ${qLangClass()}">${escapeHtml(question(card))}</div>
      </div>
      <div class="mc-options">
    `;
    st.options.forEach((opt, i) => {
      let cls = 'mc-option ' + aLangClass();
      if (st.answered) {
        if (opt === card) cls += ' correct';
        else if (opt === st.chosen) cls += ' wrong';
      }
      html += `<button class="${cls}" data-idx="${i}">${escapeHtml(answer(opt))}</button>`;
    });
    html += `</div>`;
    html += `<button class="mc-next-btn ${st.answered ? 'show' : ''}" id="mc-next">הבא ▶</button>`;

    screen.innerHTML = html;
    screen.querySelectorAll('.mc-option').forEach(btn => {
      btn.addEventListener('click', () => {
        if (st.answered) return;
        const chosen = st.options[parseInt(btn.dataset.idx)];
        st.chosen = chosen;
        st.answered = true;
        if (chosen === card) {
          st.correct++;
          unmarkHard(st.deckId, card);
        } else {
          st.wrong++;
          markHard(st.deckId, card);
        }
        renderFilterRow();
        drawMC();
      });
    });
    const nextBtn = document.getElementById('mc-next');
    if (nextBtn) nextBtn.addEventListener('click', () => {
      st.idx++;
      drawMC();
    });
  }

  // ---------- LIST MODE ----------
  let listState = null;
  function renderList() {
    const deck = currentDeck();
    const cards = activeCards();
    if (!deck || !cards.length) { renderEmpty(); return; }
    if (!listState || listState.deckId !== deck.id) {
      listState = {
        deckId: deck.id,
        hide: 'none',        // 'none' | 'ar' | 'he'
        revealed: new Set(), // indices user tapped to reveal
        search: '',
      };
    }
    // Snapshot order once per deck+order-setting
    const orderKey = deck.id + '|' + state.filter + '|' + state.order + '|' + cards.length;
    if (listState.orderKey !== orderKey) {
      listState.orderKey = orderKey;
      const idxs = state.order === 'sequential'
        ? cards.map((_, i) => i)
        : shuffle(cards.map((_, i) => i));
      listState.ordered = idxs.map(i => cards[i]);
      listState.revealed = new Set();
    }
    drawList();
  }
  function drawList() {
    const deck = currentDeck();
    const st = listState;
    const query = (st.search || '').trim();
    const filtered = st.ordered
      .map((c, i) => ({ c, i }))
      .filter(({c}) => matchesSearch(c, query));
    const totalShown = filtered.length;
    const rows = filtered.map(({c, i}) => {
      const arHidden = st.hide === 'ar' && !st.revealed.has('ar:' + i);
      const heHidden = st.hide === 'he' && !st.revealed.has('he:' + i);
      const ar = arHidden
        ? `<span class="list-hidden" data-reveal="ar:${i}">• • •</span>`
        : escapeHtml(c.ar);
      const he = heHidden
        ? `<span class="list-hidden" data-reveal="he:${i}">• • •</span>`
        : escapeHtml(c.he);
      return `<div class="list-row"><div class="list-num">${i+1}</div><div class="list-ar">${ar}</div><div class="list-he">${he}</div></div>`;
    }).join('');
    const emptySearch = query && totalShown === 0
      ? `<div class="empty"><span class="emoji">🔎</span>אין התאמות ל"${escapeHtml(query)}"</div>`
      : '';
    screen.innerHTML = `
      <div class="search-row">
        <span>🔎</span>
        <input id="list-search" placeholder="חיפוש בחפיסה (ערבית או עברית)..." dir="rtl" value="${escapeHtml(query)}" />
        ${query ? '<button id="list-search-clear" title="נקה">✕</button>' : ''}
      </div>
      <div class="list-controls">
        <button data-h="none" class="${st.hide==='none'?'active':''}">הכל</button>
        <button data-h="he" class="${st.hide==='he'?'active':''}">הסתר עברית</button>
        <button data-h="ar" class="${st.hide==='ar'?'active':''}">הסתר ערבית</button>
        <button class="btn-export" id="btn-word-export">📄 Word</button>
      </div>
      ${query ? `<div class="tip" style="margin-bottom:6px;">${totalShown} מתוך ${st.ordered.length} כרטיסים</div>` : ''}
      <div class="list-table">
        <div class="list-header">
          <div class="list-num">#</div>
          <div class="list-ar">ערבית</div>
          <div class="list-he">עברית</div>
        </div>
        ${rows}
      </div>
      ${emptySearch}
    `;
    const searchInput = document.getElementById('list-search');
    if (searchInput) {
      searchInput.addEventListener('input', () => {
        st.search = searchInput.value;
        // re-draw but keep focus/caret
        const pos = searchInput.selectionStart;
        drawList();
        const newInput = document.getElementById('list-search');
        if (newInput) {
          try { newInput.focus(); newInput.setSelectionRange(pos, pos); } catch(_){}
        }
      });
    }
    const clearBtn = document.getElementById('list-search-clear');
    if (clearBtn) clearBtn.addEventListener('click', () => { st.search = ''; drawList(); });
    screen.querySelectorAll('.list-controls [data-h]').forEach(b => {
      b.addEventListener('click', () => {
        st.hide = b.dataset.h;
        st.revealed = new Set();
        drawList();
      });
    });
    screen.querySelectorAll('[data-reveal]').forEach(el => {
      el.addEventListener('click', () => {
        st.revealed.add(el.dataset.reveal);
        drawList();
      });
    });
    document.getElementById('btn-word-export').addEventListener('click', () => {
      // export only what's visible (respects search filter)
      exportDeckToWord(deck, filtered.map(x => x.c));
    });
  }

  // ---------- WORD EXPORT ----------
